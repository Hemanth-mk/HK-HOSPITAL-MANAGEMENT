<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HK Super Multi-Specialty Hospital</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #090d16;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(30, 41, 59, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        .brand-header {
            font-weight: 800;
            background: linear-gradient(90deg, #38bdf8, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-control {
            background-color: #0d1527 !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #fff !important;
            border-radius: 8px;
            height: 45px;
        }
        .form-control:focus {
            border-color: #0284c7 !important;
            box-shadow: 0 0 0 0.2rem rgba(2, 132, 199, 0.25) !important;
        }
        .btn-login {
            background: #0284c7;
            color: white;
            font-weight: 600;
            border-radius: 50px;
            padding: 12px;
            border: none;
            transition: all 0.2s;
        }
        .btn-login:hover {
            background: #0369a1;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<div class="login-card">
    <h3 class="brand-header">🏥 HK HOSPITALS</h3>
    <h5 class="text-center font-weight-bold mb-4 text-white">Administrative Portal</h5>
    
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger py-2 small text-center" style="border-radius: 8px;">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="form-group mb-3">
            <label class="small font-weight-bold text-muted text-uppercase tracking-wider">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter admin username" required autocomplete="off">
        </div>
        <div class="form-group mb-4">
            <label class="small font-weight-bold text-muted text-uppercase tracking-wider">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter security password" required>
        </div>
        <button type="submit" class="btn btn-login btn-block shadow">
            Authenticate Access ➔
        </button>
    </form>
</div>

</body>
</html>
